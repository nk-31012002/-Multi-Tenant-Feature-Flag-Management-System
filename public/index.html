<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feature Flag System</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .wrap { max-width: 480px; width: 100%; padding: 24px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  p  { font-size: 14px; color: #777; margin-bottom: 32px; }
  .links { display: flex; flex-direction: column; gap: 12px; }
  a { display: block; padding: 16px 20px; background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; text-decoration: none; color: #111; transition: border-color 0.15s, box-shadow 0.15s; }
  a:hover { border-color: #bbb; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .role { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 4px; }
  .name { font-size: 15px; font-weight: 600; }
  .desc { font-size: 13px; color: #777; margin-top: 3px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🚩 Feature Flag System</h1>
  <p>Multi-tenant feature flag management. Choose your portal below.</p>
  <div class="links">
    <a href="/super-admin.html">
      <div class="role">Portal 1</div>
      <div class="name">Super Admin</div>
      <div class="desc">Create and manage organizations</div>
    </a>
    <a href="/admin.html">
      <div class="role">Portal 2</div>
      <div class="name">Organization Admin</div>
      <div class="desc">Manage feature flags for your organization</div>
    </a>
    <a href="/user.html">
      <div class="role">Portal 3</div>
      <div class="name">End User</div>
      <div class="desc">Check whether a feature is enabled</div>
    </a>
  </div>
</div>
</body>
</html>
